{% extends "base.html" %}
{% block title %}{{ article.title }} — El Blog{% endblock %}

{% block content %}
<a href="{{ url_for('public.home') }}" class="btn btn-ghost btn-sm"
   style="margin-bottom:2rem">← Volver</a>

<article>
  <div class="page-header">
    <h1>{{ article.title }}</h1>
    <p>{{ article.date }}</p>
  </div>
  <div class="article-body">{{ article.content }}</div>
</article>
{% endblock %}
